services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  ai:
    build: ./ai
    ports:
      - "8001:8001"
    env_file:
      - ./ai/.env
    depends_on:
      - backend
    restart: always